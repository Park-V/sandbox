body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #f5f5f5;
  color: #0a2540;
}

.presentation-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.slide-header {
  background: #003d7a;
  color: #FFFFFF;
  padding: 2rem;
  border-radius: 8px 8px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0;
}

.slide-header h1 {
  font-size: 1.875rem;
  font-weight: 600;
}

.slide-number {
  background: rgba(255, 255, 255, 0.2);
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-size: 0.875rem;
}

.slide-content {
  background: #FFFFFF;
  padding: 3rem;
  border-radius: 0 0 8px 8px;
  min-height: 600px;
  border: 1px solid #d1dfe8;
  border-top: none;
}

.slide-navigation {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  gap: 1rem;
}

.nav-button {
  background: #003d7a;
  color: #FFFFFF;
  border: none;
  padding: 0.75rem 2rem;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.2s;
  font-family: inherit;
}

.nav-button:hover:not(:disabled) {
  background: #122d4d;
}

.nav-button:disabled {
  background: #999999;
  cursor: not-allowed;
  opacity: 0.6;
}

.slide-dots {
  display: flex;
  gap: 0.5rem;
}

.slide-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #d1dfe8;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  padding: 0;
}

.slide-dot.active {
  background: #003d7a;
  transform: scale(1.3);
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.metric-card {
  padding: 2rem;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 1px 3px rgba(10, 37, 64, 0.1);
}

.metric-value {
  font-size: 2.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.metric-label {
  font-size: 0.875rem;
  font-weight: 500;
  opacity: 0.9;
}

.card {
  background: #FFFFFF;
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 1px solid #d1dfe8;
  box-shadow: 0 1px 3px rgba(10, 37, 64, 0.1);
}

.card h3 {
  color: #0a2540;
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead tr {
  background: #e8f1f8;
}

th {
  padding: 1rem;
  text-align: left;
  font-weight: 600;
  color: #1a3f5c;
  border-bottom: 1px solid #d1dfe8;
  font-size: 0.875rem;
}

th.right, td.right {
  text-align: right;
}

tbody tr {
  border-bottom: 1px solid #d1dfe8;
}

tbody tr:nth-child(even) {
  background: #e8f1f8;
}

td {
  padding: 1rem;
  color: #1a3f5c;
  font-size: 0.875rem;
}

.badge {
  padding: 0.25rem 0.75rem;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.025em;
  display: inline-block;
  white-space: nowrap;
}

.badge-success { background: #2d8a3d; color: #FFFFFF; }
.badge-alert { background: #d62828; color: #FFFFFF; }
.badge-warning { background: #ff9500; color: #FFFFFF; }
.badge-info { background: #003d7a; color: #FFFFFF; }

.highlight-box {
  background: #e8f1f8;
  border-left: 4px solid #003d7a;
  padding: 1.5rem;
  margin: 1.5rem 0;
  border-radius: 4px;
}

.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}

.cover-slide {
  text-align: center;
  padding: 4rem 2rem;
}

.cover-title {
  font-size: 3rem;
  font-weight: 700;
  color: #003d7a;
  margin-bottom: 1rem;
}

.cover-subtitle {
  font-size: 1.5rem;
  color: #1a3f5c;
  margin-bottom: 2rem;
}

.cover-tagline {
  font-size: 1.125rem;
  color: #2d5273;
  font-style: italic;
  margin-bottom: 3rem;
}

.cover-metrics {
  display: flex;
  justify-content: center;
  gap: 3rem;
  margin-top: 3rem;
  flex-wrap: wrap;
}

.cover-metric {
  text-align: center;
}

.cover-metric-value {
  font-size: 2rem;
  font-weight: 700;
  color: #003d7a;
  margin-bottom: 0.5rem;
}

.cover-metric-label {
  font-size: 0.875rem;
  color: #1a3f5c;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.progress-bar {
  background: #d1dfe8;
  height: 24px;
  border-radius: 12px;
  overflow: hidden;
  margin: 1rem 0;
}

.progress-fill {
  background: #2d8a3d;
  height: 100%;
  transition: width 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 0.75rem;
  color: #FFFFFF;
  font-weight: 600;
  font-size: 0.75rem;
}

.speaker-notes {
  background: #fff9e6;
  border: 1px solid #f1d301;
  border-radius: 8px;
  padding: 1.5rem;
  margin-top: 2rem;
}

.speaker-notes h4 {
  color: #0a2540;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.speaker-notes p {
  color: #1a3f5c;
  line-height: 1.6;
  font-size: 0.875rem;
}

ul {
  margin-left: 1.5rem;
  line-height: 1.8;
}

ul li {
  margin-bottom: 0.5rem;
}

@media print {
  .slide-navigation, .speaker-notes { display: none; }
  .slide-content { min-height: auto; page-break-after: always; }
}

    function renderSlide(slideIndex) {
      var slide = slideData[slideIndex];
      var app = document.getElementById('app');
      
      var content = '';
      if (slideIndex === 0) content = getCoverSlide();
      else if (slideIndex === 1) content = getExecutiveSlide();
      else if (slideIndex === 2) content = getFinancialSlide();
      else if (slideIndex === 3) content = getBalanceSheetSlide();
      else if (slideIndex === 4) content = getProgramImpactSlide();
      else if (slideIndex === 5) content = getEfficiencySlide();
      else if (slideIndex === 6) content = getRevenueRiskSlide();
      else if (slideIndex === 7) content = getStrategicInitiativesSlide();
      else if (slideIndex === 8) content = getOutlookSlide();
      else if (slideIndex === 9) content = getRecommendationsSlide();
      
      var dotsHtml = '';
      for (var i = 0; i < slideData.length; i++) {
        var activeClass = i === slideIndex ? ' active' : '';
        dotsHtml += '<button class="slide-dot' + activeClass + '" data-slide="' + i + '"></button>';
      }
      
      var prevDisabled = slideIndex === 0 ? ' disabled' : '';
      var nextDisabled = slideIndex === slideData.length - 1 ? ' disabled' : '';
      
      app.innerHTML = '<div class="slide-header"><div><h1>' + slide.title + '</h1></div><div class="slide-number">Slide ' + (slideIndex + 1) + ' of ' + slideData.length + '</div></div>' +
        '<div class="slide-content">' + content + '</div>' +
        '<div class="slide-navigation"><button class="nav-button" id="prevBtn"' + prevDisabled + '>Previous</button><div class="slide-dots">' + dotsHtml + '</div><button class="nav-button" id="nextBtn"' + nextDisabled + '>Next</button></div>' +
        '<div class="speaker-notes"><h4>Speaker Notes for Slide ' + (slideIndex + 1) + '</h4><p>' + slide.notes + '</p></div>';

      document.getElementById('prevBtn').addEventListener('click', function() {
        if (currentSlide > 0) {
          currentSlide--;
          renderSlide(currentSlide);
        }
      });

      document.getElementById('nextBtn').addEventListener('click', function() {
        if (currentSlide < slideData.length - 1) {
          currentSlide++;
          renderSlide(currentSlide);
        }
      });

      var dots = document.querySelectorAll('.slide-dot');
      for (var i = 0; i < dots.length; i++) {
        dots[i].addEventListener('click', function() {
          currentSlide = parseInt(this.getAttribute('data-slide'));
          renderSlide(currentSlide);
        });
      }

      setTimeout(function() {
        if (slideIndex === 2) renderFinancialCharts();
        if (slideIndex === 6) renderRevenueConcentrationChart();
      }, 100);
    }

    function renderFinancialCharts() {
      var revenueCtx = document.getElementById('revenueChart');
      if (revenueCtx) {
        if (charts.revenueChart) charts.revenueChart.destroy();
        charts.revenueChart = new Chart(revenueCtx, {
          type: 'pie',
          data: {
            labels: ['Corporate Contributions', 'Individual Donations', 'Special Events'],
            datasets: [{
              data: [1052, 198, 98],
              backgroundColor: ['#003d7a', '#2d8a3d', '#f1d301'],
              borderWidth: 2,
              borderColor: '#FFFFFF'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom' },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    var label = context.label || '';
                    var value = context.parsed;
                    var total = 0;
                    for (var i = 0; i < context.dataset.data.length; i++) {
                      total += context.dataset.data[i];
                    }
                    var pct = Math.round((value / total) * 100);
                    return label + ': $' + value + 'K (' + pct + '%)';
                  }
                }
              }
            }
          }
        });
      }

      var expenseCtx = document.getElementById('expenseChart');
      if (expenseCtx) {
        if (charts.expenseChart) charts.expenseChart.destroy();
        charts.expenseChart = new Chart(expenseCtx, {
          type: 'pie',
          data: {
            labels: ['Program Services', 'Administrative', 'Fundraising'],
            datasets: [{
              data: [269, 172, 139],
              backgroundColor: ['#003d7a', '#ff9500', '#d62828'],
              borderWidth: 2,
              borderColor: '#FFFFFF'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom' },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    var label = context.label || '';
                    var value = context.parsed;
                    var total = 0;
                    for (var i = 0; i < context.dataset.data.length; i++) {
                      total += context.dataset.data[i];
                    }
                    var pct = Math.round((value / total) * 100);
                    return label + ': $' + value + 'K (' + pct + '%)';
                  }
                }
              }
            }
          }
        });
      }
    }

    function renderRevenueConcentrationChart() {
      var ctx = document.getElementById('revenueConcentrationChart');
      if (ctx) {
        if (charts.concentrationChart) charts.concentrationChart.destroy();
        charts.concentrationChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Corporate', 'Individual', 'Events', 'Grants'],
            datasets: [
              {
                label: 'FY25 Actual',
                data: [1052, 198, 98, 0],
                backgroundColor: '#003d7a'
              },
              {
                label: 'FY26 Target',
                data: [900, 350, 100, 150],
                backgroundColor: '#2d8a3d'
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function(value) {
                    return '$' + value + 'K';
                  }
                }
              }
            },
            plugins: {
              legend: { position: 'top' },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    return context.dataset.label + ': $' + context.parsed.y + 'K';
                  }
                }
              }
            }
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderSlide(0);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' && currentSlide < slideData.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
      } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
      }
    });
  </script>

</body>
</html>
